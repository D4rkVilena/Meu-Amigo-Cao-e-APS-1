<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banho e Tosa</title>
</head>
<body>
    <a href="Home.html">Home</a>
    <h1>Agendamento Para Banho e Tosa</h1>
    <h2>Faça o seu agendamento com pelo menos 48 horas de antecedência</h2>

    <form action="">
        <fieldset>
            <legend>Identificação do dono do animal</legend>
            <br>
            <div>
                <label>Nome:</label>
                <input type="text" size="50" maxlength="150" placeholder="Digite o nome completo do dono do animal">
            </div>
            <br>
            <div>
                <label>Endereço:</label>
                <input type="text" size="50" maxlength="150" placeholder="Digite o endereço">
            </div>
            <br>
            <div>
                <label>CEP:</label>
                <input type="text" size="50" maxlength="150" placeholder="XXXXX-XXX">
            </div>
            <br>
            <div>
                <label>Email:</label>
                <input type="text" size="50" maxlength="150" placeholder="Digite o endereço de email">
            </div>
            <br>
            <div>
                <label>Tel/Cel:</label>
                <input type="text" size="50" maxlength="150" placeholder="99 99999-9999">
            </div>
            <br>
        </fieldset>
        <br>
        <fieldset>
            <legend>Animal</legend>
            <br>
             <div>
                <label>Nome:</label>
                <input type="text" size="50" maxlength="150" placeholder="Digite o nome do animal">
            </div>
            <br>
            <div>
                <label>Porte do Cão:</label>
                <input type="radio" name="Porte do Cão">
                <label>Pequeno</label>
                <input type="radio" name="Porte do Cão">
                <label>Médio</label>
                <input type="radio" name="Porte do Cão">
                <label>Grande</label>
            </div>
            <br>
            <div>
                <label>Tipo de Tosa:</label>
                <select>
                    <option value="opt1">Nenhuma</option>
                    <option value="opt2">Baixa</option>
                    <option value="opt3">Média</option>
                    <option value="opt4">Higiênica</option>
                </select>
            </div>
            <br>
            <div>
                <label>Observações:</label>
                <textarea cols="50" rows="2" placeholder="Observações"></textarea>
            </div>
        </fieldset>
        <fieldset>
            <legend>Horário - Obs: Não atendemos aos domingos e às segundas-feiras</legend>
            <br>
            <div>
            <label>Indique os dias da semana de sua preferência:</label>
            <input type="checkbox" name="seg">
            <label>Segunda-Feira</label>
            <input type="checkbox" name="ter">
            <label>Terça-Feira</label>
            <input type="checkbox" name="qua">
            <label>Quarta-Feira</label>
            <input type="checkbox" name="qui">
            <label>Quinta-Feira</label>
            <input type="checkbox" name="sex">
            <label>Sexta-Feira</label>
            </div>
            <br>
            <div>
                <label>Primeira opção de horário:</label>
                <input type="date">
            </div>
            <br>
            <div>
                <label>Segunda opção de horário:</label>
                <input type="date">
            </div>
        </fieldset>
        <input type="submit" value="Enviar">
    </form>
    
</body>
</html>
