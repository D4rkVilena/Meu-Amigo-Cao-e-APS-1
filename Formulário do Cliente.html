<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <a href="index.html">Home</a>
    <h1>Informações Pessoais</h1>
    <form action="">
        <fieldset>
            <legend>Cadastro do Cliente</legend>
            <div>
            <label>Nome:</label>
            <input type="text" size="50" maxlength="85" placeholder="Digite o nome do cliente">
            </div>
            <br>
            <div>
            <label>Idade:</label>
            <input type="text" size="10" maxlength="3" placeholder="Digite a idade">
            </div>
            <br>
            <div>
            <label>Endereço:</label>
            <br>
            <input type="text" size="100" maxlength="120" placeholder="Digite o endereço">
            </div>
            <br>
            <div>
            <label>Cidade:</label>
            <input type="text" size="50" maxlength="85" placeholder="Digite a cidade">
            </div>
            <br>
            <div>
            <label>Estado:</label>
            <input type="text" size="5" maxlength="2" placeholder="UF">
            </div>
            <br>
            <div>
            <label>Tel/Res:</label>
            <input type="text" size="20" maxlength="13" placeholder="99 99999-9999">
            </div>
            <br>
            <div>
            <label>Tel/Cel:</label>
            <input type="text" size="20" maxlength="13" placeholder="99 99999-9999">
            </div>
            <br>
            <div>
            <label>Email:</label>
            <br>
            <input type="text" size="100" maxlength="80" placeholder="Digite o endereço de email">
            </div>
        </fieldset>
        <div>
        <input type="submit" value="Enviar">
        </div>
    </form>
</body>
</html>
